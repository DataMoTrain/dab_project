# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: eb10fc51-8927-4fa3-9d04-b663773da50d

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    default: "citybike_dev"
    description: The catalog to use
  schema:
    default: "dev"
    description: The schema to use
  dev_flag:
    default: true


targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405607799653876.16.azuredatabricks.net
    # variables:
    #   catalog: dbw_dev_weu
    #   schema: dev
    presets:
      artifacts_dynamic_version: true
  test:
    mode: production
    workspace:
      host: https://adb-7405613370539191.11.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/mohsan.tahir3@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog:
        default: "citybike_test"
      dev_flag:
        default: false
      schema: prod
    permissions:
      - user_name: mohsan.tahir3@gmail.com
        level: CAN_MANAGE
    presets:
      name_prefix: '[testing] '
  prod:
    mode: production
    workspace:
      host: https://adb-7405614952101943.3.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/mohsan.tahir3@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: "citybike_prod"
      schema: prod
      dev_flag:
        default: false
    permissions:
      - user_name: mohsan.tahir3@gmail.com
        level: CAN_MANAGE
